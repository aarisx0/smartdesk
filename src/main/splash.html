<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartDesk AI</title>
  <style>
    /* No external font import — fully offline/self-contained */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0F0F1A;
      /* Use system UI fonts — loads instantly, no network needed */
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }

    /* Logo */
    .logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(79,70,229,0.55);
    }
    .logo svg { width: 36px; height: 36px; color: #fff; }

    /* Title */
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #818CF8, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtitle */
    .subtitle {
      font-size: 12px;
      color: #555577;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Status message */
    .status {
      font-size: 13px;
      color: #8B8BAD;
      min-height: 20px;
      text-align: center;
    }

    /* Animated dots loader */
    .loader {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(1) { background: #4F46E5; animation-delay: 0s; }
    .dot:nth-child(2) { background: #6366F1; animation-delay: 0.2s; }
    .dot:nth-child(3) { background: #7C3AED; animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
      40%           { transform: scale(1.0); opacity: 1.0; }
    }

    /* Progress bar */
    .progress-track {
      width: 220px; height: 3px;
      border-radius: 999px;
      background: rgba(79,70,229,0.18);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4F46E5, #7C3AED);
      transition: width 0.5s ease;
      box-shadow: 0 0 8px rgba(79,70,229,0.6);
    }

    /* Fade-in animation for the whole splash */
    .splash {
      animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <!-- Logo icon -->
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>

    <!-- App name -->
    <div>
      <p class="title">SmartDesk AI</p>
    </div>

    <!-- Bouncing dots -->
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- Status text -->
    <p class="status" id="status-text">Starting up…</p>

    <!-- Progress bar -->
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <script>
    const statusEl   = document.getElementById('status-text');
    const progressEl = document.getElementById('progress-fill');

    const STAGES = [
      { pct: 10,  msg: 'Starting SmartDesk AI…'           },
      { pct: 25,  msg: 'Loading watsonx Orchestrate…'      },
      { pct: 45,  msg: 'Initialising AI agent…'            },
      { pct: 65,  msg: 'Warming up classification engine…' },
      { pct: 82,  msg: 'Connecting services…'              },
      { pct: 95,  msg: 'Almost ready…'                     },
      { pct: 100, msg: 'Ready!'                            },
    ];

    // Spread stages over 3 seconds (splash stays for 3.5s)
    const TOTAL_MS = 3000;
    const stepMs   = TOTAL_MS / STAGES.length;

    STAGES.forEach(({ pct, msg }, i) => {
      setTimeout(() => {
        if (statusEl)   statusEl.textContent      = msg;
        if (progressEl) progressEl.style.width = pct + '%';
      }, i * stepMs);
    });
  </script>
</body>
</html>
