<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartDesk AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0D0D1A;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      color: #fff;
    }

    /* ── Glow background blobs ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 380px; height: 280px;
      background: radial-gradient(ellipse, rgba(79,70,229,0.28) 0%, transparent 70%);
      filter: blur(40px);
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 200px;
      background: radial-gradient(ellipse, rgba(124,58,237,0.18) 0%, transparent 70%);
      filter: blur(30px);
    }

    /* ── Main layout ── */
    .splash {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo box ── */
    .logo {
      width: 76px; height: 76px;
      border-radius: 22px;
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 0 32px rgba(79,70,229,0.6),
        0 8px 24px rgba(0,0,0,0.5);
      margin-bottom: 20px;
      animation: logoFloat 3s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }
    .logo svg {
      width: 38px; height: 38px;
      color: #fff;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    /* ── App name ── */
    .title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #818CF8 0%, #C4B5FD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: 11px;
      font-weight: 500;
      color: #6B6B8A;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ── Bouncing dots ── */
    .loader {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-bottom: 20px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      animation: dotBounce 1.4s infinite ease-in-out;
    }
    .dot:nth-child(1) { background: #4F46E5; animation-delay: 0s;    }
    .dot:nth-child(2) { background: #6366F1; animation-delay: 0.18s; }
    .dot:nth-child(3) { background: #7C3AED; animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%, 70%, 100% { transform: scale(0.55); opacity: 0.3; }
      35%            { transform: scale(1.0);  opacity: 1.0; }
    }

    /* ── Status text ── */
    .status {
      font-size: 12.5px;
      font-weight: 400;
      color: #8888AA;
      min-height: 18px;
      text-align: center;
      margin-bottom: 14px;
      transition: opacity 0.3s ease;
      padding: 0 20px;
    }

    /* ── Progress track ── */
    .progress-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .progress-track {
      width: 240px; height: 4px;
      border-radius: 999px;
      background: rgba(79,70,229,0.15);
      overflow: hidden;
      border: 1px solid rgba(79,70,229,0.1);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #4F46E5, #7C3AED, #A855F7);
      background-size: 200% 100%;
      transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 10px rgba(124,58,237,0.7);
      animation: shimmer 2s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .progress-pct {
      font-size: 10.5px;
      color: #4F46E5;
      font-weight: 600;
      letter-spacing: 0.5px;
      min-width: 36px;
      text-align: center;
    }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 18px;
      font-size: 10.5px;
      color: #3A3A55;
      letter-spacing: 0.4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #3A3A55;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="splash">

    <!-- Logo -->
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <!-- Folder body -->
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        <!-- AI sparkle -->
        <path d="M12 10.5l.75 1.5 1.5.75-1.5.75L12 15l-.75-1.5L9.75 12.75l1.5-.75L12 10.5z"
              fill="rgba(255,255,255,0.9)" stroke="none"/>
      </svg>
    </div>

    <!-- Name -->
    <p class="title">SmartDesk AI</p>
    <p class="subtitle">AI-Powered File Organizer</p>

    <!-- Loader dots -->
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- Status message -->
    <p class="status" id="status-text">Initializing&hellip;</p>

    <!-- Progress bar + percentage -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>Powered by IBM watsonx</span>
      <span class="footer-dot"></span>
      <span>v1.0.0</span>
    </div>

  </div>

  <!-- External script avoids Electron CSP inline-script restrictions -->
  <script src="splash.js"></script>
</body>
</html>
